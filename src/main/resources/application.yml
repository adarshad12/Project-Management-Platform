spring:
  application:
    name: project-management-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/project_management}
    username: ${DB_USERNAME:pm_user}
    password: ${DB_PASSWORD:pm_password}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
      repositories:
        enabled: false
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_PHASE_TIMEOUT:30s}

server:
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.dealshare.projectmanagement: INFO

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:local-dev-secret-change-me}
    issuer: ${SECURITY_JWT_ISSUER:project-management-platform}
    ttl-seconds: ${SECURITY_JWT_TTL_SECONDS:86400}
  rate-limit:
    requests-per-minute: ${SECURITY_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
